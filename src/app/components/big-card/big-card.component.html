<div class="big-card__container">
  <a href="#" target="_self" rel="noopener noreferrer">
    <div class="big-card__photo">
      <img
      src="{{ photoCover }}"
      alt="{{ photoAlt }}"
      >
    </div>
    <div class="big-card__title">
      <h1><a href="#">{{ cardTitle }}</a></h1>
    </div>
    <div class="big-card__description">
      <p>
        {{ cardDescription }}
      </p>
    </div>
  </a>
</div>
